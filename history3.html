    <style>
:root {
    --bg-color: #000000;
    --surface-color: #111111;
    --text-color: #ffffff;
    --text-secondary: #888888;
    --border-color: #333333;
    --accent-color: #ffffff;
    --accent-hover: #cccccc;
    --header-bg: #1a1a1a;
    --badge-bg: #1a1a1a;
    --list-bg: #0a0a0a;
    --list-item-bg: #111111;
    --list-item-hover: #1a1a1a;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', Helvetica, Arial, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    line-height: 1.6;
    padding: 2rem;
    min-height: 100vh;
}

.container {
    max-width: 900px;
    margin: 0 auto;
}

h1 {
    text-align: center;
    margin-bottom: 2rem;
    color: var(--text-color);
    font-weight: 300;
    letter-spacing: -0.5px;
    font-size: 2rem;
}

.stats {
    text-align: center;
    margin-bottom: 2rem;
    color: var(--text-secondary);
    font-size: 0.85rem;
    font-weight: 300;
}

.entry {
    background-color: var(--surface-color);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    border: 1px solid var(--border-color);
    transition: border-color 0.15s ease;
}

.entry:hover {
    border-color: var(--text-color);
}

.entry-header {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1rem;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 0.75rem;
}

.entry-id {
    font-weight: 400;
    font-size: 0.85rem;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
}

.entry-name {
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--text-color);
    margin-right: auto;
    letter-spacing: -0.3px;
}

.entry-date {
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 300;
}

.events-list {
    list-style: none;
    margin: 1rem 0;
}

.events-list li {
    padding: 0.5rem 0;
    margin-bottom: 0.25rem;
    font-size: 0.9rem;
    border-bottom: 1px solid var(--border-color);
}

.events-list li:last-child {
    border-bottom: none;
}

.summary-box {
    padding: 0.75rem 0;
    margin-top: 0.75rem;
    color: var(--text-secondary);
    font-size: 0.85rem;
    border-top: 1px solid var(--border-color);
}

.summary-box strong {
    color: var(--text-color);
    font-weight: 400;
}

.footer {
    text-align: center;
    margin-top: 3rem;
    color: var(--text-secondary);
    font-size: 0.75rem;
    border-top: 1px solid var(--border-color);
    padding-top: 1.5rem;
}

.search-box {
    margin-bottom: 2rem;
    text-align: center;
}

#search {
    width: 100%;
    max-width: 400px;
    padding: 0.75rem 1rem;
    background-color: var(--surface-color);
    border: 1px solid var(--border-color);
    border-radius: 0;
    color: var(--text-color);
    font-size: 0.9rem;
    font-family: inherit;
}

#search:focus {
    outline: none;
    border-color: var(--text-color);
}

#search::placeholder {
    color: var(--text-secondary);
}

@media (max-width: 600px) {
    body {
        padding: 1rem;
    }
    .entry-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
    }
    .entry-name {
        font-size: 1.25rem;
    }
    .entry {
        padding: 1rem;
    }
}

</head>

        const container = document.getElementById('entries-container');
        const searchInput = document.getElementById('search');
        const totalSpan = document.getElementById('totalCount');
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function renderEntries(filterText = '') {
            const filtered = entries.filter(entry => 
                filterText === '' || 
                entry.name.toLowerCase().includes(filterText.toLowerCase()) ||
                entry.date.toLowerCase().includes(filterText.toLowerCase()) ||
                entry.summary.toLowerCase().includes(filterText.toLowerCase()) ||
                entry.events.some(e => e.toLowerCase().includes(filterText.toLowerCase()))
            );
            
            totalSpan.textContent = filtered.length;
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:3rem;">🔍 Ештеме табылмады</div>';
                return;
            }
            
            let html = '';
            for (const entry of filtered) {
                html += `
                <div class="entry">
                    <div class="entry-header">
                        <span class="entry-id">${escapeHtml(entry.id)}</span>
                        <span class="entry-name">${escapeHtml(entry.name)}</span>
                        <span class="entry-date">${escapeHtml(entry.date)}</span>
                    </div>
                    <ul class="events-list">
                        ${entry.events.map(e => `<li>${escapeHtml(e)}</li>`).join('')}
                    </ul>
                    <div class="summary-box">
                        <strong>Қорытынды:</strong> ${escapeHtml(entry.summary)}
                    </div>
                </div>
                `;
            }
            container.innerHTML = html;
        }
        
        searchInput.addEventListener('input', (e) => renderEntries(e.target.value));
        renderEntries();
    </script>
